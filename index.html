<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Velocity X</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >


  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >



  <link rel="stylesheet" href="assets/css/styles.css">

</head>

<body>


  <div id="loader">
    <div class="spinner"></div>
  </div>


  <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">

    <div class="container">

      <a class="navbar-brand" href="#">
        VELOCITY <span>X</span>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="#featured">
              Featured
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#cars">
              Cars
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>


  <section class="hero-section">

    <div class="hero-overlay"></div>

    <div class="container hero-content">

      <div class="row align-items-center min-vh-100 hero-row">

        <div class="col-lg-6">

          <h1 class="hero-title">
            THE FUTURE OF
            <span>PERFORMANCE</span>
          </h1>

          <p class="hero-text">
            Explore the world's most advanced and luxurious supercars.
          </p>

          <a href="#cars" class="btn hero-btn">
            Explore Now
            <i class="fa-solid fa-arrow-right"></i>
          </a>

        </div>

      </div>

    </div>

  </section>

  <!-- FEATURED -->

  <section id="featured" class="featured-section">

    <div class="container">

      <h2 class="section-title text-center">
        Cars In The Spotlight
      </h2>

      <div
        id="carouselExample"
        class="carousel slide"
        data-bs-ride="carousel"
      >

        <div
          class="carousel-inner"
          id="carousel-content"
        ></div>

        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>

      </div>

    </div>

  </section>


  <section id="cars" class="cars-section">

    <div class="container">

      <h2 class="section-title text-center">
        Luxury Collection
      </h2>

      <div class="row g-4" id="cars-container"></div>

    </div>

  </section>


  <button id="backToTop">
    <i class="fa-solid fa-arrow-up"></i>
  </button>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



  <script src="assets/js/app.js"></script>

</body>
</html>
